<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">CLRS-lean proof map</title>
  <desc id="desc">A chapter-ordered map showing proved, partial, and deferred CLRS proof sections.</desc>
  <rect width="960" height="520" fill="#f5f7f4"/>
  <path d="M64 96H896" stroke="#202522" stroke-width="2"/>
  <path d="M64 216H896" stroke="#202522" stroke-width="2" stroke-dasharray="10 12"/>
  <path d="M64 336H896" stroke="#202522" stroke-width="2" stroke-dasharray="3 10"/>
  <g font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#202522">
    <text x="62" y="64">CLRS-lean proof map</text>
  </g>
  <g font-family="'Segoe UI', sans-serif" font-size="15" fill="#4f5a54">
    <text x="64" y="126">proved</text>
    <text x="64" y="246">partial</text>
    <text x="64" y="366">deferred</text>
  </g>
  <g>
    <rect x="192" y="68" width="190" height="72" rx="8" fill="#ffffff" stroke="#2f6f5f" stroke-width="3"/>
    <text x="214" y="100" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#202522">Section 16.3</text>
    <text x="214" y="124" font-family="'Segoe UI', sans-serif" font-size="15" fill="#2f6f5f">Huffman codes</text>
  </g>
  <g>
    <rect x="420" y="188" width="238" height="72" rx="8" fill="#ffffff" stroke="#c46a44" stroke-width="3"/>
    <text x="442" y="220" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#202522">Section 23.1</text>
    <text x="442" y="244" font-family="'Segoe UI', sans-serif" font-size="15" fill="#a94d2d">Growing an MST</text>
  </g>
  <g>
    <rect x="690" y="188" width="206" height="72" rx="8" fill="#ffffff" stroke="#c46a44" stroke-width="3"/>
    <text x="712" y="220" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#202522">Section 23.2</text>
    <text x="712" y="244" font-family="'Segoe UI', sans-serif" font-size="15" fill="#a94d2d">Kruskal and Prim</text>
  </g>
  <g>
    <rect x="690" y="308" width="206" height="72" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="3"/>
    <text x="712" y="340" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#202522">Implementation</text>
    <text x="712" y="364" font-family="'Segoe UI', sans-serif" font-size="15" fill="#59616b">Union-find proof</text>
  </g>
  <path d="M383 104C455 122 489 154 520 188" fill="none" stroke="#2f6f5f" stroke-width="3"/>
  <path d="M659 224H690" stroke="#c46a44" stroke-width="3"/>
  <path d="M793 261V308" stroke="#6b7280" stroke-width="3"/>
  <g font-family="'Segoe UI', sans-serif" font-size="13" fill="#4f5a54">
    <text x="208" y="470">green: completed theorem</text>
    <text x="420" y="470">orange: mathematical core in progress</text>
    <text x="690" y="470">gray: intentionally deferred</text>
  </g>
</svg>
