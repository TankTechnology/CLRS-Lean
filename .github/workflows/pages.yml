name: Build and deploy Verso site

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check repository metadata
        run: python3 scripts/check_repository.py

      - uses: leanprover/lean-action@v1
        with:
          build: true
          test: false
          use-mathlib-cache: true

      - name: Restore Verso literate cache
        id: restore-verso-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            .lake/build/literate
          key: verso-literate-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}-${{ github.sha }}
          restore-keys: |
            verso-literate-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}-

      - name: Clean stale generated HTML
        run: rm -rf .lake/build/literate-html _site

      - name: Build Verso literate HTML
        id: build-site
        run: echo "path=$(lake query :literateHtml)" >> "$GITHUB_OUTPUT"

      - name: Save Verso literate cache
        if: steps.restore-verso-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            .lake/build/literate
          key: verso-literate-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}-${{ github.sha }}

      - name: Check generated HTML freshness
        run: python3 scripts/check_literate_html_freshness.py "${{ steps.build-site.outputs.path }}"

      - name: Assemble optimized _site
        run: |
          python3 scripts/prepare_literate_site.py \
            "${{ steps.build-site.outputs.path }}" \
            _site \
            --base-url "https://tanktechnology.github.io/CLRS-Lean/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
